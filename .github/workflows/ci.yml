name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Build
        run: make

      - name: Run tests
        run: make test

  lint:
    name: Lint (cppcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: make lint

  format:
    name: Format (clang-format-18)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format-18
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-18
          sudo ln -sf /usr/bin/clang-format-18 /usr/local/bin/clang-format

      - name: Check formatting
        run: make format-check

  go-sdk:
    name: Go SDK (build + vet + integration tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: sdk/go.sum

      - name: Install C++ dependencies
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Build broker binary
        run: make

      - name: Go vet
        run: make sdk-vet

      - name: Go integration tests
        run: make sdk-test

  docker:
    name: Docker (build + cluster smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fluxmq-broker .

      - name: Start 3-broker cluster
        run: docker compose up -d

      - name: Wait for all brokers to be healthy
        run: |
          for i in $(seq 1 30); do
            healthy=$(docker compose ps | grep -c "healthy" || true)
            echo "Healthy brokers: $healthy/3"
            if [ "$healthy" -ge 3 ]; then exit 0; fi
            sleep 2
          done
          echo "Cluster did not become healthy in time"
          docker compose logs
          exit 1

      - name: Smoke test — metrics endpoints reachable
        run: |
          curl -sf http://localhost:9093/metrics | grep -q fluxmq_bytes_in_total
          curl -sf http://localhost:9095/metrics | grep -q fluxmq_bytes_in_total
          curl -sf http://localhost:9097/metrics | grep -q fluxmq_bytes_in_total
          echo "All three broker metrics endpoints OK"

      - name: Teardown
        if: always()
        run: docker compose down -v
